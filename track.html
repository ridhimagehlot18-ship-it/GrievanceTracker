<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status - Citizen Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5 text-center">
                        <h2 class="card-title mb-4">
                            <i class="fas fa-search text-primary me-2"></i>
                            Track Complaint Status
                        </h2>
                        
                        <form action="/track" method="POST">
                            <div class="input-group mb-4">
                                <span class="input-group-text">
                                    <i class="fas fa-hashtag text-primary"></i>
                                </span>
                                <input type="text" name="complaint_id" class="form-control form-control-lg" 
                                       placeholder="Enter your Complaint ID (e.g., CMP502918)" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                Track Status
                            </button>
                        </form>

                        <!-- Sample Result (shown after tracking) -->
                        <div id="result" class="mt-5" style="display: none;">
                            <div class="alert alert-success">
                                <h5><i class="fas fa-check-circle me-2"></i>Status Found!</h5>
                                <p><strong>Complaint ID:</strong> CMP502918</p>
                                <p><strong>Category:</strong> Streetlight</p>
                                <p><strong>Status:</strong> <span class="badge bg-success">Resolved</span></p>
                                <p><strong>Resolution:</strong> Bulb replaced on 15 May</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
