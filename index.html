<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Grievance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, var(--primary), #4259b4); color:white; padding: 80px 0; }
        .btn-custom { background: var(--primary); border: none; }
        .btn-custom:hover { background: #d4d5d9; }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-4">
                <i class="fas fa-shield-alt me-3"></i>
                Citizen Grievance Portal
            </h1>
            <p class="lead mb-5">Report local issues and track their resolution transparently</p>
            
            <div class="row justify-content-center g-4">
                <div class="col-md-4">
                    <a href="/submit" class="btn btn-light btn-lg btn-custom px-5 py-3">
                        <i class="fas fa-plus-circle me-2"></i>
                        Submit Complaint
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="/track" class="btn btn-outline-light btn-lg px-5 py-3">
                        <i class="fas fa-search me-2"></i>
                        Track Status
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Stats Preview -->
    <section class="py-5 bg-light">
        <div class="container">
            <div class="row text-center">
                <div class="col-md-4 mb-4">
                    <h3 class="text-primary">124</h3>
                    <p class="h6 text-muted">Total Complaints</p>
                </div>
                <div class="col-md-4 mb-4">
                    <h3 class="text-success">87</h3>
                    <p class="h6 text-muted">Resolved</p>
                </div>
                <div class="col-md-4 mb-4">
                    <h3 class="text-warning">37</h3>
                    <p class="h6 text-muted">Pending</p>
                </div>
            </div>
            <div class="text-center">
                <a href="/stats" class="btn btn-primary btn-lg">View Full Stats</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 Citizen Grievance Portal | Built by Team  The Think tank</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
